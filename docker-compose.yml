services:
  backend:
    image: kistoo/onpe-backend:latest
    container_name: onpe-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/resultados"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: kistoo/onpe-frontend:latest
    container_name: onpe-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
